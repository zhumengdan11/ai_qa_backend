{% extends 'qa_app/base.html' %}
{% load static %}

{% block title %}管理员登录 - AI问答系统{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>管理员登录</h2>
            <p>校内 AI 问答后台管理系统</p>
        </div>

        <form id="loginForm" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">
                    <i class="fas fa-user"></i> 用户名
                </label>
                <input type="text" id="username" class="form-input" placeholder="请输入管理员用户名" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i> 密码
                </label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
            </div>

            <div id="loginError" class="login-error" style="display:none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMsg"></span>
            </div>

            <button type="submit" id="loginBtn" class="login-btn">
                <span>登 录</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="login-footer">
            <a href="{% url 'chat' %}" class="back-link">
                <i class="fas fa-arrow-left"></i> 返回问答首页
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
const loginForm = document.getElementById('loginForm');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const errorMsg = document.getElementById('errorMsg');
const csrfToken = '{{ csrf_token }}';

loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
        showError('请输入用户名和密码');
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';

    try {
        const response = await fetch('/api/admin/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
            window.location.href = '/admin-panel/';
        } else {
            showError(result.message || '用户名或密码错误');
        }
    } catch (error) {
        showError('网络错误，请重试');
    } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<span>登 录</span><i class="fas fa-arrow-right"></i>';
    }
});

function showError(msg) {
    errorMsg.textContent = msg;
    loginError.style.display = 'flex';
}
</script>
{% endblock %}
